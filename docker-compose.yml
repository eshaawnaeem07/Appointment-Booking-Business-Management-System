services:
  postgres:
    image: postgres:16-alpine
    container_name: booking_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: bookingSystem
    ports:
      - "5400:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookingSystem"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: booking_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: booking_api
    environment:
      SQLALCHEMY_DATABASE_URL: postgresql://postgres:12345@postgres:5432/bookingSystem
      REDIS_URL: redis://redis:6379/0
      SENDGRID_API_KEY: ${DOCKER_SENDGRID_API_KEY:-}
      FROM_EMAIL: ${DOCKER_FROM_EMAIL:-eshaanaeem07@gmail.com}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:8080
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  celery:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: booking_celery
    environment:
      SQLALCHEMY_DATABASE_URL: postgresql://postgres:12345@postgres:5432/bookingSystem
      REDIS_URL: redis://redis:6379/0
      SENDGRID_API_KEY: ${DOCKER_SENDGRID_API_KEY:-}
      FROM_EMAIL: ${DOCKER_FROM_EMAIL:-eshaanaeem07@gmail.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app.celery worker --loglevel=info

  flower:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: booking_flower
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app.celery flower --port=5555 --broker=redis://redis:6379/0

  frontend:
    build:
      context: ./easy-bookings
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: booking_frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
